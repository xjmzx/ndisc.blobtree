<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131d2a"/>
      <stop offset="100%" stop-color="#090d12"/>
    </linearGradient>
  </defs>
  <!-- card -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22"
        fill="none" stroke="#7af0cd" stroke-width="3" opacity="0.6"/>

  <!-- ndisc.blobtree: deformed circular blob in mauve, replacing the
       earlier "FLAC" wordmark. Slightly squished left + right, bulging
       upper-right, so it reads as organic rather than a clean circle. -->
  <path d="
    M 64 22
    C 82 20 96 30 94 48
    C 96 64 80 72 64 72
    C 46 72 32 60 34 46
    C 32 28 48 20 64 22 Z
  " fill="#a78bfa"/>

  <!-- spectrum bars: full bars on the left (audible band) decay to almost
       nothing on the right (above the lossy cutoff) — the visual story of
       what the scanner detects. Mint matches the new fizx.uk accent. -->
  <g fill="#7af0cd">
    <rect x="22"  y="86" width="6" height="22" rx="1"/>
    <rect x="32"  y="82" width="6" height="26" rx="1"/>
    <rect x="42"  y="88" width="6" height="20" rx="1"/>
    <rect x="52"  y="84" width="6" height="24" rx="1"/>
    <rect x="62"  y="92" width="6" height="16" rx="1"/>
    <rect x="72"  y="96" width="6" height="12" rx="1"/>
  </g>
  <g fill="#6b7a8d">
    <rect x="82"  y="102" width="6" height="6" rx="1"/>
    <rect x="92"  y="104" width="6" height="4" rx="1"/>
    <rect x="102" y="106" width="6" height="2" rx="1"/>
  </g>
</svg>
